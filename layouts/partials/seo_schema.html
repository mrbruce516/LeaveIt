{{- /* JSON-LD 结构化数据：首页 WebSite，文章页 BlogPosting */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "{{ .Permalink }}",
    "name": "{{ .Site.Title }}",
    "description": "{{ .Site.Params.description }}",
    "inLanguage": "{{ .Site.LanguageCode }}"{{ with .Site.Params.seo_image }},
    "image": "{{ . | absURL }}"{{ end }},
    "author": {
        "@type": "Person",
        "name": "{{ .Site.Params.author }}"
    }
}
</script>
{{- end }}
{{- if .IsPage }}
{{- $image := "" -}}
{{- $image = (partial "featured_image.html" .) -}}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
    },
    "articleSection": "{{ .Section }}",
    "name": "{{ .Title }}",
    "headline": "{{ .Title }}",
    "description": "{{ if .Description }}{{ .Description }}{{ else }}{{ .Summary }}{{ end }}",
    "inLanguage": "{{ .Site.LanguageCode }}",
    "author": {
        "@type": "Person",
        "name": "{{ if isset .Params "author" }}{{ .Params.author }}{{ else }}{{ .Site.Params.author }}{{ end }}"
    },
    "publisher": {
        "@type": "Person",
        "name": "{{ if isset .Params "author" }}{{ .Params.author }}{{ else }}{{ .Site.Params.author }}{{ end }}"
    },
    "copyrightYear": "{{ .Date.Format "2006" }}",
    "datePublished": "{{ .Date.Format "2006-01-02T15:04:05-07:00" }}",
    "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05-07:00" }}",
    "url": "{{ .Permalink }}",
    "wordCount": "{{ .WordCount }}"{{ with $image }},
    "image": "{{ . }}"{{ end }},
    "keywords": [{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}"{{ $tag }}"{{ end }}]
}
</script>
{{- end }}
